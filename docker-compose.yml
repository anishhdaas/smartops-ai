x-smartops-app: &smartops-app
  build:
    context: .
    dockerfile: Dockerfile
  image: smartops-ai:latest

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: smartops-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_log:/var/lib/zookeeper/log
      - smartops_logs:/app/logs
    networks:
      - smartops
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/2181'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: smartops-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
      - smartops_logs:/app/logs
    networks:
      - smartops
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --create --if-not-exists --topic raw_incidents --partitions 3 --replication-factor 1 >/dev/null 2>&1 && kafka-topics --bootstrap-server localhost:9092 --describe --topic raw_incidents >/dev/null 2>&1",
        ]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 60s

  log-generator:
    <<: *smartops-app
    container_name: smartops-log-generator
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: raw_incidents
      EVENTS_PER_HOUR: ${EVENTS_PER_HOUR:-125000}
      RUNTIME_HOURS: ${RUNTIME_HOURS:-8}
    command:
      - /bin/sh
      - -c
      - |
        python -u producer/log_generator.py 2>>/app/logs/log-generator.err | python -u -c '
        import json
        import os
        import sys
        from kafka import KafkaProducer

        producer = KafkaProducer(
            bootstrap_servers=os.getenv("KAFKA_BOOTSTRAP_SERVERS", "kafka:9092").split(","),
            value_serializer=lambda value: json.dumps(value, separators=(",", ":")).encode("utf-8"),
            linger_ms=50,
            retries=5,
        )
        topic = os.getenv("KAFKA_TOPIC", "raw_incidents")
        for line in sys.stdin:
            line = line.strip()
            if not line:
                continue
            producer.send(topic, json.loads(line))
        producer.flush()
        '
    volumes:
      - smartops_logs:/app/logs
      - vector_db:/vector_db
    networks:
      - smartops

  kafka-consumer:
    <<: *smartops-app
    container_name: smartops-kafka-consumer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: raw_incidents
      KAFKA_CONSUMER_GROUP: validation_group
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE}
      SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-RAW}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
      SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-}
    command: ["python", "-u", "kafka/consumer.py"]
    volumes:
      - smartops_logs:/app/logs
      - vector_db:/vector_db
    networks:
      - smartops

  dbt-runner:
    <<: *smartops-app
    container_name: smartops-dbt-runner
    restart: unless-stopped
    working_dir: /app/dbt
    environment:
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE}
      SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-ANALYTICS}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
      SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-}
    command:
      - /bin/sh
      - -c
      - |
        cat > /app/.dbt/profiles.yml <<EOF
        smartops_incidents:
          target: prod
          outputs:
            prod:
              type: snowflake
              account: "$${SNOWFLAKE_ACCOUNT}"
              user: "$${SNOWFLAKE_USER}"
              password: "$${SNOWFLAKE_PASSWORD}"
              role: "$${SNOWFLAKE_ROLE}"
              database: "$${SNOWFLAKE_DATABASE}"
              warehouse: "$${SNOWFLAKE_WAREHOUSE}"
              schema: "$${SNOWFLAKE_SCHEMA}"
              threads: 4
              client_session_keep_alive: false
        EOF
        while true; do
          dbt run --profiles-dir /app/.dbt 2>&1 | tee -a /app/logs/dbt-runner.log
          sleep "$${DBT_RUN_INTERVAL_SECONDS:-900}"
        done
    volumes:
      - smartops_logs:/app/logs
      - vector_db:/vector_db
    networks:
      - smartops
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/logs/dbt-runner.log"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 90s

  data-quality:
    <<: *smartops-app
    container_name: smartops-data-quality
    restart: unless-stopped
    environment:
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE}
      SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-ANALYTICS}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
      SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-}
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          python -u scripts/run_validations.py 2>&1 | tee -a /app/logs/data-quality.log
          sleep "$${DATA_QUALITY_INTERVAL_SECONDS:-1800}"
        done
    volumes:
      - smartops_logs:/app/logs
      - vector_db:/vector_db
    networks:
      - smartops
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/logs/data-quality.log"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 90s

  embeddings-refresh:
    <<: *smartops-app
    container_name: smartops-embeddings-refresh
    restart: unless-stopped
    environment:
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE}
      SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-ANALYTICS}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
      SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_HOST: ${PINECONE_HOST}
      PINECONE_INDEX: ${PINECONE_INDEX}
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          python -u rag/embeddings_refresher.py 2>&1 | tee -a /app/logs/embeddings-refresh.log
          sleep "$${EMBEDDINGS_REFRESH_INTERVAL_SECONDS:-86400}"
        done
    volumes:
      - smartops_logs:/app/logs
      - vector_db:/vector_db
    networks:
      - smartops
    healthcheck:
      test: ["CMD-SHELL", "test -f /vector_db/incidents.parquet -o -f /app/logs/embeddings-refresh.log"]
      interval: 5m
      timeout: 10s
      retries: 5
      start_period: 2m

  mcp-server:
    <<: *smartops-app
    container_name: smartops-mcp-server
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 5000
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE}
      SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-ANALYTICS}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
      SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: raw_incidents
      KAFKA_CONSUMER_GROUP: validation_group
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_HOST: ${PINECONE_HOST}
      PINECONE_INDEX: ${PINECONE_INDEX}
    command: ["python", "-u", "mcp/server.py", "--http"]
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - smartops_logs:/app/logs
      - vector_db:/vector_db
    networks:
      - smartops
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import json, urllib.request; data=json.load(urllib.request.urlopen(\"http://127.0.0.1:5000/health\", timeout=5)); raise SystemExit(0 if data.get(\"ok\") else 1)'",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  smartops:
    driver: bridge

volumes:
  kafka_data:
  zk_data:
  zk_log:
  smartops_logs:
  vector_db:
